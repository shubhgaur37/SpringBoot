spring:
  application:
    name: Prod_Ready_Features

  datasource:
    url: jdbc:mysql://localhost:3306/Prod_Ready_Features
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: create # flag changed to update to see updated by behavior by changing auditor aware modifier value

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    devtools:
      restart:
        enabled: true
        exclude: com/shubh/module4/Prod_Ready_Features/dto