spring:
  application:
    name: "Spring Security Demo"

  datasource:
    url: jdbc:mysql://localhost:3306/Spring_Security_Practice
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    devtools:
      restart:
        enabled: true
        exclude: com/shubh/module5/Spring_Security_Practice/dto

logging:
  level:
    com.shubh.module5.Spring_Security_Practice: TRACE

jwt:
  secretKey: a-string-secret-at-least-256-bits-long-YO