name: Publish JaCoCo Report

on:
  push:
    branches:
      - main
    paths:
      - 'M7_TestingMethodologies/**'
      - '.github/workflows/jacoco-report.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build project and generate JaCoCo report
        working-directory: M7_TestingMethodologies
        run: mvn clean verify

      - name: Upload JaCoCo report
        uses: actions/upload-pages-artifact@v3
        with:
          path: M7_TestingMethodologies/target/site/jacoco

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4